<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pronostics - Coupe du Monde 2026</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Écran de connexion -->
  <div id="login" class="login">
    <div class="login-card">
      <h1>Pronostics<br>Coupe du Monde 2026</h1>
      <p class="muted">Entre ton pseudo et ton code secret (PIN). Un nouveau pseudo crée ton compte.</p>
      <input id="login-name" placeholder="Pseudo" autocomplete="off" />
      <input id="login-pin" type="password" inputmode="numeric" placeholder="Code PIN (min. 3)" autocomplete="off" />
      <button id="login-btn" class="accent">Entrer</button>
      <div id="login-msg" class="msg"></div>
      <div id="login-config" class="warn" hidden>
        ⚠ Supabase n'est pas configuré. Renseigne <code>js/config.js</code> (voir README).
      </div>
    </div>
  </div>

  <!-- Application -->
  <div id="app" hidden>
    <header class="topbar">
      <div class="brand">Pronostics <span>Coupe du Monde 2026</span></div>
      <div class="spacer"></div>
      <div class="rule">1 pt bon résultat &nbsp;•&nbsp; 2 pts à 1 but près &nbsp;•&nbsp; 3 pts score exact</div>
      <canvas id="me-avatar" width="34" height="48" class="me-avatar"></canvas>
      <span id="me-name" class="me-name"></span>
      <button id="logout" class="ghost" title="Se déconnecter">Quitter</button>
    </header>

    <nav id="tabs" class="tabs"></nav>
    <main id="panel" class="panel"></main>
    <div id="toast" class="toast" hidden></div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
