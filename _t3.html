<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8"><title>t</title><link rel="stylesheet" href="css/style.css"></head><body>
<div id="login" class="login"><div class="login-card"><div class="login-head"><img src="assets/locie.png" class="logo-big"><canvas id="login-trophy" width="86" height="118"></canvas></div><h1>Pronostics<br>Coupe du Monde 2026</h1><input id="login-name" placeholder="Pseudo"><input id="login-pin" type="password" placeholder="PIN"><button id="login-btn" class="accent">Entrer</button><div id="login-msg" class="msg"></div><div id="login-config" hidden></div></div></div>
<div id="app" hidden><header class="topbar"><img src="assets/locie.png" class="logo"><canvas id="top-trophy" width="30" height="42"></canvas><div class="brand">Pronostics <span>CdM 2026</span></div><div class="spacer"></div><div class="rule">1/2/3</div><canvas id="me-avatar" width="34" height="48" class="me-avatar"></canvas><span id="me-name" class="me-name"></span><button id="logout" class="ghost">Quitter</button></header><nav id="tabs" class="tabs"></nav><main id="panel" class="panel"></main><div id="toast" class="toast" hidden></div></div>
<script type="module">
import { MATCHES } from "./js/data.js";
const AV=(c,n,g="Homme",sk="Claire",h="Court",hc="Brun",b=false)=>({country:c,number:n,gender:g,skin:sk,hair:h,hair_color:hc,beard:b});
const players=[{id:"p1",name:"Mel",avatar:AV("France",10),is_admin:true},{id:"p2",name:"Lea",avatar:AV("Brazil",7,"Femme","Hâlée","Long","Blond")}];
const gm=MATCHES.map(m=>({...m,grp:m.group,home_score:null,away_score:null}));
const R={A1:[2,0],A2:[2,1],D1:[4,1]}; for(const m of gm){if(R[m.id]){m.home_score=R[m.id][0];m.away_score=R[m.id][1];}}
const now=Date.now(); const pub=[]; for(const m of gm){if(Date.parse(m.kickoff)<=now){pub.push({player_id:"p1",match_id:m.id,home:2,away:0,created_at:m.kickoff});pub.push({player_id:"p2",match_id:m.id,home:0,away:1,created_at:m.kickoff});}}
const mine=gm.map(m=>({match_id:m.id,home:2,away:0,created_at:m.kickoff,updated_at:m.kickoff}));
window.fetch=async(u)=>{const j=x=>({ok:true,status:200,json:async()=>x});u=String(u);
 if(u.includes("/rpc/register_or_login"))return j({ok:true,name:"Mel",avatar:players[0].avatar,is_admin:true});
 if(u.includes("/rpc/get_my_predictions"))return j(mine);
 if(u.includes("/players"))return j(players); if(u.includes("/matches"))return j(gm); if(u.includes("/predictions"))return j(pub);
 if(u.includes("/rpc/"))return j({ok:true}); return new Response("",{status:200});};
const goApp=location.hash.startsWith("#app");
if(goApp) localStorage.setItem("pron_session",JSON.stringify({name:"Mel",pin:"0000"})); else localStorage.removeItem("pron_session");
await import("./js/app.js");
if(goApp) setTimeout(()=>{const b=[...document.querySelectorAll("#tabs button")].find(x=>x.textContent.trim()==="Classement");if(b)b.click();},900);
</script></body></html>
